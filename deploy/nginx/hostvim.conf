# Hostvim — nginx site (Debian/Ubuntu: /etc/nginx/sites-available/hostvim)
# Yer tutucular: __SERVER_NAME__ __PANEL_PUBLIC__
#
# ÖNEMLİ — Frontend build (VITE_BASE_URL):
#   Panel kökünde yayın (http://sunucu/):  VITE_BASE_URL=/  veya boş
#   Sadece /admin/ altında özel kurulum:   VITE_BASE_URL=/admin/  (sonunda /)
# Yanlış base (ör. /admin/ + zaten /admin URL) → tarayıcı /admin/admin/assets/ ister,
# nginx index.html döner → "MIME type text/html" ve sayfa çökük görünür.
#
# Yükleme limiti: PHP upload_max_filesize ile birlikte burada da artırın.
# Öneri: server bloğunda client_max_body_size + php-fpm pool/request_terminate_timeout.

# Öneri: gerçek alan adı ile değiştirin; yalnız IP için default_server kullanın
server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    root __PANEL_PUBLIC__;
    index index.html index.php;

    client_max_body_size 128M;

    # Gizli dosyalar
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Engine WebSocket (tarayıcı terminali) — hostvim-engine 127.0.0.1:9090
    # rewrite yerine proxy_pass URI soneki: /engine-ws/terminal → /ws/terminal (daha güvenilir)
    location ^~ /engine-ws/ {
        proxy_pass http://127.0.0.1:9090/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # phpMyAdmin (apt: /usr/share/phpmyadmin) — panel PHP-FPM ile
    location = /phpmyadmin {
        return 301 /phpmyadmin/;
    }

    location ^~ /phpmyadmin/ {
        root /usr/share/;
        index index.php;
        try_files $uri $uri/ /phpmyadmin/index.php?$is_args$args;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass unix:__PHP_FPM_SOCK__;
            fastcgi_read_timeout 300s;
        }
    }

    # Laravel API + Sanctum + sağlık
    location ^~ /api/ {
        try_files $uri /index.php?$is_args$args;
    }

    location ^~ /sanctum/ {
        try_files $uri /index.php?$is_args$args;
    }

    location = /up {
        try_files $uri /index.php?$is_args$args;
    }

    # Ön yüz axios tabanı `.../index.php/api` (XAMPP / rewrite’sız uyumu).
    # Bu URI'ler `location /` + try_files ile index.html'e düşerse POST → 405 Not Allowed olur.
    location ~ ^/index\.php/ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_read_timeout 120s;
    }

    # Panel /admin altında yayınlandığında API çağrıları `/admin/index.php/api/...` olur.
    # Bunları doğrudan PHP'ye göndermezsek SPA fallback'e düşer ve POST istekleri 405 döner.
    location ~ ^/admin/index\.php/ {
        rewrite ^/admin(/index\.php/.*)$ $1 break;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_read_timeout 120s;
    }

    # PHP soketi: kurulum betiği __PHP_FPM_SOCK__ ile değiştirir
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_read_timeout 120s;
    }

    # React SPA (Vite build çıktısı public/ içinde)
    # Build `VITE_BASE_URL=/admin/` ile alındığında statik dosyalar `/admin/assets/*` olur.
    # Fiziksel yol `public/assets/*` olduğu için burada rewrite yapıyoruz.
    #
    # Hatalı çift önek (VITE_BASE + URL birleşimi): /admin/admin/assets/* → yine /assets/*
    location ^~ /admin/admin/assets/ {
        rewrite ^/admin/admin/assets/(.*)$ /assets/$1 break;
        try_files $uri =404;
        access_log off;
    }

    location ^~ /admin/assets/ {
        rewrite ^/admin/assets/(.*)$ /assets/$1 break;
        try_files $uri =404;
        access_log off;
    }

    # Kökten /assets/* (VITE_BASE_URL=/); SPA fallback'e düşmesin
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
    }

    # `/admin/*` altındaki SPA route'ları index.html'e düşür.
    location ^~ /admin/ {
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache: statik varlıklar
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
