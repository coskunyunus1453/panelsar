# Panelsar — nginx site (Debian/Ubuntu: /etc/nginx/sites-available/panelsar)
# Yer tutucular: __SERVER_NAME__ __PANEL_PUBLIC__

# Öneri: gerçek alan adı ile değiştirin; yalnız IP için default_server kullanın
server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    root __PANEL_PUBLIC__;
    index index.html index.php;

    # Gizli dosyalar
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Engine WebSocket (tarayıcı terminali) — panelsar-engine 127.0.0.1:9090
    # rewrite yerine proxy_pass URI soneki: /engine-ws/terminal → /ws/terminal (daha güvenilir)
    location ^~ /engine-ws/ {
        proxy_pass http://127.0.0.1:9090/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
        proxy_buffering off;
    }

    # phpMyAdmin (apt: /usr/share/phpmyadmin) — panel PHP-FPM ile
    location = /phpmyadmin {
        return 301 /phpmyadmin/;
    }

    location ^~ /phpmyadmin/ {
        root /usr/share/;
        index index.php;
        try_files $uri $uri/ /phpmyadmin/index.php?$is_args$args;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_pass unix:__PHP_FPM_SOCK__;
            fastcgi_read_timeout 300s;
        }
    }

    # Laravel API + Sanctum + sağlık
    location ^~ /api/ {
        try_files $uri /index.php?$is_args$args;
    }

    location ^~ /sanctum/ {
        try_files $uri /index.php?$is_args$args;
    }

    location = /up {
        try_files $uri /index.php?$is_args$args;
    }

    # PHP soketi: kurulum betiği __PHP_FPM_SOCK__ ile değiştirir
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_read_timeout 120s;
    }

    # React SPA (Vite build çıktısı public/ içinde)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache: statik varlıklar
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
