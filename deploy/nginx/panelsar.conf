# Panelsar — nginx site (Debian/Ubuntu: /etc/nginx/sites-available/panelsar)
# Yer tutucular: __SERVER_NAME__ __PANEL_PUBLIC__

# Öneri: gerçek alan adı ile değiştirin; yalnız IP için default_server kullanın
server {
    listen 80;
    listen [::]:80;
    server_name __SERVER_NAME__;

    root __PANEL_PUBLIC__;
    index index.html index.php;

    # Gizli dosyalar
    location ~ /\.(?!well-known) {
        deny all;
    }

    # Laravel API + Sanctum + sağlık
    location ^~ /api/ {
        try_files $uri /index.php?$is_args$args;
    }

    location ^~ /sanctum/ {
        try_files $uri /index.php?$is_args$args;
    }

    location = /up {
        try_files $uri /index.php?$is_args$args;
    }

    # PHP soketi: kurulum betiği __PHP_FPM_SOCK__ ile değiştirir
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_pass unix:__PHP_FPM_SOCK__;
        fastcgi_read_timeout 120s;
    }

    # React SPA (Vite build çıktısı public/ içinde)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache: statik varlıklar
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
