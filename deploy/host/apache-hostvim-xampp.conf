# =============================================================================
# Hostvim — XAMPP (macOS) Apache sanal host
# =============================================================================
# DocumentRoot: panel/public (Laravel front controller + React SPA)
#
# KURULUM (özet):
#
# 1) /etc/hosts — yerel alan adı:
#    sudo sh -c 'echo "127.0.0.1 hostvim.local" >> /etc/hosts'
#
# 2) XAMPP Apache’de sanal host dosyaları açık olsun. Şu dosyayı düzenleyin:
#    /Applications/XAMPP/xamppfiles/etc/httpd.conf
#    İçinde şu satırın başında # olmamalı:
#    Include etc/extra/httpd-vhosts.conf
#
# 3) httpd-vhosts.conf sonuna tek satır ekleyin (tam yol):
#    Include "/Applications/XAMPP/xamppfiles/htdocs/hostvim/deploy/host/apache-hostvim-xampp.conf"
#
#    İsterseniz bu dosyayı kopyalayıp doğrudan httpd-vhosts.conf içine de yapıştırabilirsiniz.
#
# 4) Apache’yi XAMPP kontrol panelinden yeniden başlatın.
#
# 5) Panel .env:
#    APP_URL=http://hostvim.local
#
# Tarayıcı: http://hostvim.local/
# =============================================================================

# Projeyi başka dizine taşıdıysanız sadece bu yolu güncelleyin:
Define HOSTVIM_ROOT "/Applications/XAMPP/xamppfiles/htdocs/hostvim"

<VirtualHost *:80>
    ServerName hostvim.local
    ServerAlias www.hostvim.local
    ServerAdmin webmaster@localhost

    DocumentRoot "${HOSTVIM_ROOT}/panel/public"

    <Directory "${HOSTVIM_ROOT}/panel/public">
        Options FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # XAMPP günlük dizini (ServerRoot’a göre değil, tam yol)
    ErrorLog "/Applications/XAMPP/xamppfiles/logs/hostvim-error.log"
    CustomLog "/Applications/XAMPP/xamppfiles/logs/hostvim-access.log" common
</VirtualHost>
